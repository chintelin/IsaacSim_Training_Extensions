# Extension configuration file.
# Visit the "Extension configuration file (extension.toml)" section for more details:
# https://docs.omniverse.nvidia.com/kit/docs/kit-manual/latest/guide/extensions_advanced.html
#

[core]
reloadable = true
order = 0

[package]
version = "0.1.0"
category = "simulation"
title = "NCUME-CPS 02 SLAM"
description = "Understand and perform mobile robot SLAM in the enviornment"
authors = ["Chin-Te LIN"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"omni.kit.uiapp" = {}
"omni.graph.action" = {}
"omni.isaac.core_nodes" = {}
"isaacsim.ros2.bridge" = {}
"omni.replicator.core" = {}

# define the Python module that the extension provides
[[python.module]]
name = "ncume.cps.SLAM"

[settings]
exts."ncume.cps.SLAM".timeout = 5
